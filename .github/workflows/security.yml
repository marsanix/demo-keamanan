# File: .github/workflows/security.yml
# Simpan file ini di folder .github/workflows/ di repository kalian

name: Security Check

# Kapan pipeline ini berjalan?
on:
  push:                    # Setiap kali push
    branches: [main]       # ke branch main
  pull_request:            # Atau setiap ada Pull Request
    branches: [main]

jobs:
  # === JOB 1: Cek Dependencies ===
  cek-dependencies:
    name: Cek Package yang Berbahaya
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4       # Download kode dari repo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci                     # Install berdasarkan lockfile

      - name: Jalankan NPM Audit
        run: npm audit --audit-level=high
        # Kalau ada vulnerability HIGH atau CRITICAL,
        # pipeline akan GAGAL dan developer diberitahu

  # === JOB 2: Scan Kode untuk Kerentanan ===
  scan-kode:
    name: Scan Kode Sumber
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Jalankan Semgrep
        run: semgrep scan --config=p/javascript --config=p/owasp-top-ten --error .
        # --error = exit code 1 jika ada finding (pipeline GAGAL)
        # Semgrep akan scan kode kalian mencari:
        # - Hardcoded password/secret
        # - SQL injection
        # - XSS vulnerability
        # - Dan masih banyak lagi
        # GRATIS untuk open source!

  # === JOB 3: Cek Apakah Ada Rahasia yang Ke-commit ===
  cek-rahasia:
    name: Deteksi Password di Kode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Scan SEMUA history commit

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Jalankan Gitleaks
        run: ./gitleaks detect --source=. --config=.gitleaks.toml --verbose
        # Gitleaks akan scan kode kalian mencari:
        # - API keys (AWS, Stripe, dll)
        # - Password database
        # - Secret tokens (GitHub, GitLab, dll)
        # - SSH keys
        # - File .env yang seharusnya tidak di-commit
        # Menggunakan config custom untuk deteksi lebih akurat!

